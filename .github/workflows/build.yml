name: Multi-Platform Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # 수동 실행 지원

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Generate AI Agent Guide
        run: python scripts/generate_guide.py

      - name: Build with PyInstaller
        run: pyinstaller --clean --onedir --name operator_bin src/operator_cli/main.py

      - name: Package for macOS
        run: |
          mkdir -p release/mac
          mv dist/operator_bin/* release/mac/
          cp -r protocols release/mac/
          cp docs/AGENT_GUIDE.md release/mac/
          cd release && zip -r ../operator_mac.zip mac/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: operator-macos
          path: operator_mac.zip

  build-windows:
    runs-on: windows-latest
    env:
      PYTHONUTF8: 1
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Generate AI Agent Guide
        run: python scripts/generate_guide.py

      - name: Build with PyInstaller
        run: pyinstaller --clean --onedir --name operator_bin src/operator_cli/main.py

      - name: Package for Windows
        run: |
          mkdir release\win
          move dist\operator_bin\* release\win\
          xcopy /E /I protocols release\win\protocols
          copy docs\AGENT_GUIDE.md release\win\
          powershell Compress-Archive -Path release\win\* -DestinationPath operator_win.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: operator-windows
          path: operator_win.zip
