name: Multi-Platform Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # 수동 실행 지원

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build and Package (macOS)
        run: |
          chmod +x scripts/build.sh
          ./scripts/build.sh
          cd release && zip -r ../operator_mac.zip operator_mac/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: operator-macos
          path: operator_mac.zip

  build-windows:
    runs-on: windows-latest
    env:
      PYTHONUTF8: 1
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build and Package (Windows)
        run: |
          ./scripts/build.ps1
          python -c "import shutil; shutil.make_archive('operator_win', 'zip', 'release', 'operator_win')"
        shell: powershell

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: operator-windows
          path: operator_win.zip
